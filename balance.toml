# ============================ RINGS ==========================================
#  Each ring boosts one attribute. The bonus amount is global
#  (progression.ring_bonus); only the boosted attribute and price live here.

[rings."Red Ring"]
attribute = "Strength"
value = 200

[rings."Yellow Ring"]
attribute = "Agility"
value = 200

[rings."Blue Ring"]
attribute = "Intelligence"
value = 200

[rings."Green Ring"]
attribute = "Endurance"
value = 200


# ============================ ENEMIES ========================================
#  Fields: health, damage, defence, optional weakness + resistance.
#  weakness/resistance are damage types ("melee"/"ranged"/"magic") or the
#  "physical" shorthand (melee and ranged). Omit for none.
#
#  Each location mixes matchups so every build meets favourable and
#  unfavourable enemies; total challenge stays comparable across builds.
#
#  The weakness/resistance table is deliberately symmetric: each of the three
#  damage types is the weakness of exactly two enemies and is resisted by
#  exactly two, so no build is systematically favoured. Goblin (tutorial) and
#  Golem (boss) are neutral, the latter a pure stat-check climax.

[enemies.Goblin]
health = 30
damage = 4
defence = 0

[enemies.Spider]
health = 45
damage = 6
defence = 5
weakness = "melee"
resistance = "ranged"

[enemies.Wolf]
health = 50
damage = 7
defence = 5
weakness = "ranged"
resistance = "magic"

[enemies.Slime]
health = 55
damage = 6
defence = 0
weakness = "magic"
resistance = "melee"

# Was a harmless punching bag (3 dmg); now it bites.
[enemies.Ghoul]
health = 55
damage = 7
defence = 8
weakness = "ranged"
resistance = "melee"

[enemies.Skeleton]
health = 50
damage = 7
defence = 12
weakness = "melee"
resistance = "magic"

# Was a defence=100 gimmick; now a proper "bring magic" check: weak to magic.
[enemies.Wraith]
health = 45
damage = 7
defence = 0
weakness = "magic"
resistance = "ranged"

# Boss: neutral to all damage types -- high health, defence and damage make it
# a threat to every build equally, not a check on one element.
[enemies.Golem]
health = 120
damage = 8
defence = 20
